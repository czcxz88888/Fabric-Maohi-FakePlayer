name: Auto Build Maohi Mod
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build-mod-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Build with Gradle
        run: gradle build
        env:
          CONFIG: ${{ secrets.CONFIG }}

      - name: Get JAR file name
        id: jar-name
        run: |
          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*-dev.jar" ! -name "*-sources.jar" | head -1)
          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "Found JAR file: $JAR_FILE"

      - name: Delete existing release and tag
        run: |
          # 1. 尝试使用全量命令删除旧 Release 和附带的 tag
          gh release delete latest --cleanup-tag -y || true
          
          # 2. 强制清理远程 tag（兜底）
          git push --delete origin latest || true
          
          # 3. 将 latest 标签强行绑定到当前的最新代码 commit 上并推送到仓库
          git tag -f latest
          git push origin -f latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          body: |
            ## Download
            Download the JAR file below and place it in your server's `mods` folder.
          files: ${{ steps.jar-name.outputs.jar_file }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: maohi-latest-build
          path: ${{ steps.jar-name.outputs.jar_file }}
          retention-days: 60

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 2
